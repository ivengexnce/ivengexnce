name: Generate GitHub Contribution Snake

on:
  schedule:
    # Run daily at midnight UTC
    - cron: "0 0 * * *"
  # Allow manual triggering
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ivengexnce
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          # Optional: Customize snake colors
          svg_out_size: 1080
          # Uncomment for custom colors:
          # svg_out_size: 1080

      - name: Push generated snake to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
          cname: false
          force_orphan: false

      - name: Create workflow summary
        run: |
          echo "✅ GitHub Contribution Snake generated successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Snake files created:" >> $GITHUB_STEP_SUMMARY
          echo "  - github-contribution-grid-snake.svg (light mode)" >> $GITHUB_STEP_SUMMARY
          echo "  - github-contribution-grid-snake-dark.svg (dark mode)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📍 Branch: output" >> $GITHUB_STEP_SUMMARYname: Generate GitHub Contribution Snake

